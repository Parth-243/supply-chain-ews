# Supply Chain Disruption EWS — Docker Compose
# Starts 4 services: MongoDB, ML Service (FastAPI), Backend (Express), Frontend (Next.js)
#
# Usage:
#   docker compose up --build          # first run (builds images)
#   docker compose up                  # subsequent runs
#   docker compose down                # stop everything
#   docker compose down -v             # stop + delete DB volume

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: ews_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: supply_chain_ews
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML Service (FastAPI / Python) ─────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ews_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ml_models:/app/saved_models  # persist trained .pkl files across restarts
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Backend (Express / Node.js) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ews_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/supply_chain_ews
      ML_SERVICE_URL: http://ml-service:8000
      # Add optional notification keys here:
      # SMTP_HOST: smtp.gmail.com
      # NEWS_API_KEY: your_key_here
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/ping', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ews_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  ml_models:
    driver: local
